<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <meta name="theme-color" content="#00853F" />
    <title>You're offline — Jaypai</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #F8F8F6;
        color: #111827;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
      }
      .icon {
        width: 72px;
        height: 72px;
        border-radius: 18px;
        background: #00853F;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 24px;
      }
      .icon svg { width: 44px; height: 44px; }
      h1 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
      p { font-size: 14px; color: #6B7280; max-width: 280px; line-height: 1.5; margin-bottom: 24px; }
      button {
        background: #00853F;
        color: #fff;
        border: none;
        border-radius: 12px;
        padding: 14px 28px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
      }
      button:active { opacity: 0.85; }
    </style>
  </head>
  <body>
    <div class="icon">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M85 15 L15 45 L42 53 L50 80 L60 55 L85 15 Z" stroke="#fff" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>Jaypai needs a connection for this page. Check your internet and try again — your data is safe.</p>
    <button onclick="window.location.reload()">Try again</button>
  </body>
</html>
